name: Build & Test

on:
  push:
    branches: [ master, version_updates ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout zoned
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Zoned depends on a fork of kotlinx.html published as
      # org.jetbrains.kotlinx:kotlinx-html:0.12.0-web, which is not on Maven
      # Central. Build & publish the JVM/JS/metadata variants to Maven Local.
      # (The fork also defines Apple targets, which can't build on Linux — so we
      # publish only the variants zoned actually consumes.)
      - name: Checkout kotlinx.html fork
        uses: actions/checkout@v4
        with:
          repository: reubenfirmin/kotlinx-html-new
          path: kotlinx-html-fork

      - name: Publish kotlinx.html fork to Maven Local
        working-directory: kotlinx-html-fork
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon \
            publishKotlinMultiplatformPublicationToMavenLocal \
            publishJvmPublicationToMavenLocal \
            publishJsPublicationToMavenLocal

      # The root build applies its own Gradle plugin (io.4rc.zoned.plugin), so it
      # can't configure until that plugin exists in a repository. Bootstrap it by
      # publishing the :gradle-plugin subproject with the self-application
      # temporarily disabled, then restore build.gradle.kts.
      - name: Bootstrap zoned Gradle plugin to Maven Local
        run: |
          chmod +x ./gradlew
          sed -i 's#id("io.4rc.zoned.plugin")#// id("io.4rc.zoned.plugin")#' build.gradle.kts
          ./gradlew --no-daemon :gradle-plugin:publishToMavenLocal
          git checkout -- build.gradle.kts

      - name: Build & test
        run: ./gradlew --no-daemon build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/test-results/**/*.xml
            build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 7
