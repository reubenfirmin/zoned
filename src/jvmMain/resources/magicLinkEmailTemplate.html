<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${subject}</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
<table role="presentation" style="width: 100%; border-collapse: collapse;">
    <tr>
        <td style="padding: 0;">
            <table role="presentation" style="width: 100%; max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                <!-- Header -->
                <tr>
                    <td style="padding: 40px 30px; text-align: center;">
                        <h1 style="color: #333333; font-size: 24px; margin-top: 20px;">${subject}</h1>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding: 30px;">
                        <p style="color: #666666; font-size: 16px; line-height: 1.6; margin: 0 0 20px;">
                            ${text1}
                        </p>
                        <p style="color: #666666; font-size: 16px; line-height: 1.6; margin: 0 0 30px;">
                            ${text2}
                        </p>

                        <!-- CTA Button -->
                        <table role="presentation" style="margin: 0 auto;">
                            <tr>
                                <td style="border-radius: 4px; background-color: #007bff;">
                                    <a href="${cta}" style="display: inline-block; padding: 16px 36px; font-size: 16px; color: #ffffff; text-decoration: none">${linkText}</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding: 30px; background-color: #f8f9fa; text-align: center;">
                        <p style="color: #999999; font-size: 14px; margin: 0;">
                            This link will expire soon. If you didn't request this, you can safely ignore this email.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
